[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

# Invariant / fuzz settings used by the InflationGuard-synthesized property tests.
[fuzz]
runs = 256

[invariant]
runs = 256
depth = 64
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
